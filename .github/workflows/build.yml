name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup V
        uses: vlang/setup-v@v1
        with:
          check-latest: true

      - name: Build all tools
        shell: pwsh
        working-directory: ${{ github.workspace }}
        run: |
          Get-ChildItem -Directory -Filter 'exe_*' | Sort-Object Name | ForEach-Object {
            $buildBat = Join-Path $_.FullName 'build.bat'
            if (-not (Test-Path $buildBat)) {
              Write-Warning "Skipping $($_.Name): build.bat not found"
              return
            }
            Write-Host "Building $($_.Name)..."
            & $buildBat
            if ($LASTEXITCODE -ne 0) { throw "Build failed for $($_.Name)" }
          }
          Write-Host "All 16 tools built successfully."

      - name: Build grep again (debug builds only — for test runner)
        shell: pwsh
        working-directory: ${{ github.workspace }}\exe_grep
        run: |
          # Tests invoke the binary; ensure a fresh -prod build exists.
          pushd .
          v -prod -o "..\..\grep.exe" .
          popd

      - name: Build findd again (for advanced test path)
        shell: pwsh
        working-directory: ${{ github.workspace }}\exe_find
        run: |
          pushd .
          v -prod -o "..\..\findd.exe" .
          popd

      - name: Run tests
        shell: pwsh
        working-directory: ${{ github.workspace }}
        run: |
          $failed = @()
          Get-ChildItem -Directory -Filter 'exe_*' | Sort-Object Name | ForEach-Object {
            $testDir = Join-Path $_.FullName 'tests'
            if (-not (Test-Path $testDir)) { return }
            Write-Host "Testing $($_.Name)..."
            Push-Location $_.FullName
            v test tests
            if ($LASTEXITCODE -ne 0) { $failed += $_.Name }
            Pop-Location
          }
          if ($failed.Count -gt 0) {
            throw "Tests failed for: $($failed -join ', ')"
          }
          Write-Host "All tests passed."

      - name: Collect binaries
        shell: pwsh
        working-directory: ${{ github.workspace }}
        run: |
          $dist = Join-Path $PWD 'dist'
          New-Item -ItemType Directory -Path $dist -Force | Out-Null
          $names = @(
            'ls', 'cat', 'grep', 'rm', 'mkdir', 'touch', 'cp', 'mv',
            'findd', 'pwd', 'which', 'head', 'tail', 'sort', 'uniq', 'xargs'
          )
          foreach ($name in $names) {
            $src = Join-Path $PWD "$name.exe"
            if (Test-Path $src) {
              Copy-Item $src $dist
              Write-Host "Collected $name.exe"
            } else {
              Write-Warning "$name.exe not found"
            }
          }

      - name: Set version
        id: version
        shell: pwsh
        run: |
          if ('${{ github.ref }}' -match 'refs/tags/v(.+)') {
            $ver = $Matches[1]
          } else {
            $ver = "git-$('${{ github.sha }}'.Substring(0, 7))"
          }
          "version=$ver" >> $env:GITHUB_OUTPUT

      - name: Create ZIP
        shell: pwsh
        working-directory: ${{ github.workspace }}
        run: |
          $zipName = "unix-emulators-win-${{ steps.version.outputs.version }}.zip"
          Compress-Archive -Path dist\* -DestinationPath $zipName
          Write-Host "Created $zipName"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: unix-emulators-win-${{ steps.version.outputs.version }}
          path: "*.zip"
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: "*.zip"
          generate_release_notes: true
