name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    name: Build 16 UNIX tools for Windows
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install V (pre-built binary)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          Write-Host "Fetching latest V release info..."
          $release = Invoke-RestMethod -Uri "https://api.github.com/repos/vlang/v/releases/latest" -Headers @{ 'Accept' = 'application/vnd.github+json' }

          $asset = $release.assets | Where-Object { $_.name -eq 'v_windows.zip' }
          if (-not $asset) {
            $names = $release.assets | ForEach-Object { $_.name }
            throw "Asset 'v_windows.zip' not found in latest release. Available: $($names -join ', ')"
          }

          $tag = $release.tag_name
          Write-Host "Latest V release: $tag ($(($asset.size / 1MB).ToString('0.0')) MB)"
          Write-Host "Downloading $($asset.browser_download_url)..."
          Invoke-WebRequest -Uri $asset.browser_download_url -OutFile "$env:RUNNER_TEMP\v.zip"

          Write-Host "Extracting..."
          $extractDir = "$env:RUNNER_TEMP\vlang"
          Expand-Archive -Path "$env:RUNNER_TEMP\v.zip" -DestinationPath $extractDir -Force

          # The zip may contain 'v.exe' at root or nested in a 'v/' subfolder
          $candidates = @(
            (Join-Path $extractDir 'v.exe'),
            (Join-Path $extractDir 'v' 'v.exe')
          )
          $vExe = $candidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $vExe) {
            Get-ChildItem $extractDir -Recurse -Filter 'v.exe' | Select-Object FullName
            throw "v.exe not found after extraction."
          }

          $vDir = Split-Path $vExe -Parent
          Write-Host "V binary found at: $vExe"
          Write-Host "Adding to PATH: $vDir"
          Add-Content -Path $env:GITHUB_PATH -Value $vDir

          & $vExe --version 2>&1 | Write-Host

      - name: Verify V
        shell: pwsh
        run: |
          v --version
          v doctor

      - name: Build all tools
        shell: pwsh
        run: |
          Get-ChildItem -Directory -Filter 'exe_*' | Sort-Object Name | ForEach-Object {
            $buildBat = Join-Path $_.FullName 'build.bat'
            if (-not (Test-Path $buildBat)) {
              Write-Warning "Skipping $($_.Name): build.bat not found"
              return
            }
            Write-Host "Building $($_.Name)..."
            & $buildBat
            if ($LASTEXITCODE -ne 0) { throw "Build failed for $($_.Name)" }
          }
          Write-Host "All 16 tools built successfully."

      - name: Run all test suites
        shell: pwsh
        run: |
          $failed = @()
          Get-ChildItem -Directory -Filter 'exe_*' | Sort-Object Name | ForEach-Object {
            $testDir = Join-Path $_.FullName 'tests'
            if (-not (Test-Path $testDir)) { return }
            Write-Host "Testing $($_.Name)..."
            Push-Location $_.FullName
            v test tests
            if ($LASTEXITCODE -ne 0) { $failed += $_.Name }
            Pop-Location
          }
          if ($failed.Count -gt 0) {
            throw "Tests failed for: $($failed -join ', ')"
          }
          Write-Host "All test suites passed."

      - name: Collect binaries
        shell: pwsh
        run: |
          $dist = Join-Path $PWD 'dist'
          New-Item -ItemType Directory -Path $dist -Force | Out-Null

          $names = @(
            'ls', 'cat', 'grep', 'rm', 'mkdir', 'touch', 'cp', 'mv',
            'findd', 'pwd', 'which', 'head', 'tail', 'sort', 'uniq', 'xargs'
          )
          foreach ($name in $names) {
            # Try current dir first, then parent dirs (build.bat compiles to ../../)
            $src = Get-ChildItem -Path $PWD -Filter "$name.exe" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
            if (-not $src) {
              $src = Get-ChildItem -Path (Join-Path $PWD '..') -Filter "$name.exe" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
            }
            if ($src) {
              Copy-Item $src.FullName $dist
              Write-Host "Collected $name.exe from $($src.FullName)"
            } else {
              Write-Warning "$name.exe not found — skipping"
            }
          }

      - name: Determine version
        id: version
        shell: pwsh
        run: |
          if ('${{ github.ref }}' -match 'refs/tags/v(.+)') {
            $ver = $Matches[1]
          } else {
            $ver = "git-$('${{ github.sha }}'.Substring(0, 7))"
          }
          "version=$ver" >> $env:GITHUB_OUTPUT

      - name: Create ZIP archive
        shell: pwsh
        run: |
          $zipName = "unix-emulators-win-${{ steps.version.outputs.version }}.zip"
          Compress-Archive -Path dist\* -DestinationPath $zipName
          Write-Host "Created $zipName"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: unix-emulators-win-${{ steps.version.outputs.version }}
          path: '*.zip'
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: '*.zip'
          generate_release_notes: true
